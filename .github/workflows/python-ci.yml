# BUG 1: This workflow uses on: push — it can't be called by other workflows.
# Change to on: workflow_call and add inputs.

name: Python CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      test-command:
        type: string
        default: "pytest"

# BUG 2: inputs block is missing
# Add:
# on:
#   workflow_call:
#     inputs:
#       python-version:
#         type: string
#         default: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt pytest
      - run: ${{ inputs.test-command }}  # should use ${{ inputs.test-command }}
