name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: pytest

  build-and-push:
    # BUG 1: this job runs unconditionally — add: needs: test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # BUG 5: missing setup-buildx step
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # BUG 2: hardcoded password — use docker/login-action with secrets
        uses: docker/login-action@v2
        with:
           username: ${{ secrets.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}



      - name: Build image
        # BUG 3: only tagged :latest — add a SHA tag
        # BUG 4: use docker/build-push-action instead of plain docker build/push
        uses: docker/build-push-action@v5
        with:
            context: .
            push: true
            tags: nchoudhary1108/devops-app:latest, nchoudhary1108/devops-app:${{ github.sha }}
        