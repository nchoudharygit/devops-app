name: CI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      API_KEY: ${{ secrets.API_KEY }} # BUG 1: hardcoded secret — use ${{ secrets.API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy
        run: echo "Deploying application with API_KEY=$API_KEY"
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test   # BUG 2: set this at job level, not per-step
      API_KEY: ${{ secrets.API_KEY }} # BUG 1: hardcoded secret — use ${{ secrets.API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest
       

      - name: Run tests
        run: pytest

      - name: validate API key is set
        run: |
          if [ -z "$API_KEY" ]; then
            echo "Error: API_KEY is not set"
            exit 1
          fi

        