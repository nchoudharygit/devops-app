name: CI

on:
  push:
    branches: [main, 01,02]
  pull_request:
    branches: [main]

jobs:
  # BUG 4: lint and test are in one job — split them into parallel jobs
  
   
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip list
          which python
          which pip
      
      - name: Run flake8
        # BUG 1: no .flake8 config — will fail on long lines in the sample app
        run: flake8 app.py 
        # Alternative:
  
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip list
          which python
          which pip

      - name: Run pytest
        # BUG 2: no coverage flags — add --cov=app --cov-report=xml
        run: pytest --cov=. --cov-report=xml

      # BUG 5: no artifact upload step for coverage.xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml